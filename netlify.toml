[build]
  publish = "."
    functions = "netlify/functions"

    [functions]
      node_bundler = "esbuild"
      external_node_modules = ["@anthropic-ai/sdk"]

    [functions."generate-daily"]
      timeout = 60

      [[redirects]]
        from = "/api/*"
          to = "/.netlify/functions/:splat"
            status = 200
